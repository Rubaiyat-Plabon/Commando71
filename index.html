<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Command Control Station</title>
    <style>
        body {
            background-color: #050b05;
            color: #33ff33;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #33ff33;
            padding-bottom: 10px;
            width: 100%;
            max-width: 800px;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #33ff33;
        }
        .operator-info {
            font-size: 14px;
            color: #88ff88;
            margin-top: 5px;
        }
        .clock {
            font-size: 16px;
            color: #ffff33;
            margin-top: 5px;
            font-weight: bold;
        }
        .dashboard {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            flex-wrap: wrap;
        }
        .panel {
            flex: 1;
            min-width: 300px;
            border: 1px solid #33ff33;
            padding: 20px;
            background: rgba(0, 20, 0, 0.5);
            box-shadow: inset 0 0 10px rgba(51, 255, 51, 0.2);
        }
        .panel h2 {
            margin-top: 0;
            font-size: 18px;
            border-bottom: 1px dashed #33ff33;
            padding-bottom: 5px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            text-transform: uppercase;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            background: #000;
            border: 1px solid #33ff33;
            color: #33ff33;
            font-family: monospace;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 5px #33ff33;
        }
        button {
            background: #33ff33;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
        }
        button:hover {
            background: #00cc00;
            box-shadow: 0 0 10px #33ff33;
        }
        .logs {
            background: #000;
            border: 1px solid #33ff33;
            padding: 10px;
            height: 120px;
            overflow-y: auto;
            font-size: 12px;
            color: #00ff00;
        }
        .sector-badge {
            color: #ff3333;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>⚡ BASE COMMAND CONTROL STATION ⚡</h1>
        <div class="operator-info">STATION OPERATOR: <span id="operator-name">COMMANDO</span> | SECTOR: <span id="current-sector" class="sector-badge">LOCKED</span></div>
        <div id="live-clock" class="clock">TIMESTAMP: LOADING...</div>
    </div>

    <div class="dashboard">
        <!-- Control Input Panel -->
        <div class="panel">
            <h2>📜 HQ Directive Control</h2>
            <div class="input-group">
                <label>Directive Code</label>
                <input type="text" id="directive-code" placeholder="e.g., ALPHA-71">
            </div>
            <div class="input-group">
                <label>Transmission Payload</label>
                <textarea id="directive-payload" rows="3" placeholder="Enter encrypted message..."></textarea>
            </div>
            <button onclick="transmitDirective()">⚡ Transmit Directive</button>
        </div>

        <!-- System Logs Panel -->
        <div class="panel">
            <h2>📜 System Audit Logs</h2>
            <div id="gps-log" style="color: #33ffff; font-size: 13px; margin-bottom: 10px;">[00:00] Initializing GPS Uplink...</div>
            <div class="logs" id="system-logs">
                [00:01] Dashboard initialized.<br>
                [00:02] Quantum encryption layer active.
            </div>
        </div>
    </div>

    <script>
        // ১. রিয়েল-টাইম লোকাল ক্লক ইঞ্জিন
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = `TIMESTAMP: ${now.toLocaleString()}`;
        }
        setInterval(updateClock, 1000); 
        updateClock();

        // ২. আপগ্রেডেড জিপিএস ও লোকেশন ফলব্যাক ইঞ্জিন
        function detectLocation() {
            const sectorElement = document.getElementById('current-sector');
            const gpsLog = document.getElementById('gps-log');
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude; 
                    const lon = position.coords.longitude;
                    
                    // লগে কোঅর্ডিনেট পুশ
                    gpsLog.innerText = `[${new Date().toLocaleTimeString()}] GPS Locked: ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                    
                    // এপিআই রেসপন্স না করলে ব্যাকআপ হিসেবে কোঅর্ডিনেট বেসড ফিল্টার
                    let defaultSector = "DHAKA-71";
                    if (lat > 23.88) {
                        defaultSector = "GAZIPUR-71";
                    }

                    // অনলাইন ম্যাপ সার্ভিস থেকে লোকেশন চেক
                    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10`)
                        .then(response => response.json())
                        .then(data => {
                            const stateName = data.address.state || data.address.city || data.address.suburb || "";
                            if (stateName) {
                                const cleanName = stateName.replace(/[\s_]Division/i, "").toUpperCase();
                                sectorElement.innerText = `${cleanName}-71`;
                                gpsLog.innerText += ` | Sector Resolved: ${cleanName}`;
                            } else {
                                sectorElement.innerText = defaultSector;
                                gpsLog.innerText += ` | Sector (Fallback): ${defaultSector.split('-')[0]}`;
                            }
                        })
                        .catch(() => {
                            // নেটওয়ার্ক ব্লক বা এপিআই ফেইল করলে ব্যাকআপ জোন লক হবে
                            sectorElement.innerText = defaultSector;
                            gpsLog.innerText += ` | Sector (Fallback): ${defaultSector.split('-')[0]}`;
                        });
                }, () => {
                    sectorElement.innerText = "DHAKA-71";
                    gpsLog.innerText = `[${new Date().toLocaleTimeString()}] GPS Permission Denied. Defaulting to DHAKA-71`;
                });
            } else {
                sectorElement.innerText = "DHAKA-71";
            }
        }
        detectLocation();

        // ৩. ডিরেক্টিভ ট্রান্সমিশন হ্যান্ডলার
        function transmitDirective() {
            const code = document.getElementById('directive-code').value.trim();
            const payload = document.getElementById('directive-payload').value.trim();
            const logs = document.getElementById('system-logs');
            const timeStr = new Date().toLocaleTimeString();

            if (!code || !payload) {
                alert("Error: All directive fields must be populated before transmission.");
                return;
            }

            const newLog = `[${timeStr}] <span style="color: #ffff33;">[TRANSMIT]</span> Code: ${code} | Payload: ${payload}<br>`;
            logs.innerHTML = newLog + logs.innerHTML;

            // ইনপুট বক্স ক্লিয়ার করা
            document.getElementById('directive-code').value = '';
            document.getElementById('directive-payload').value = '';
        }
    </script>
</body>
</html>
