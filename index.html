<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Command Control Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        @keyframes radarScanner { 0% { top: -100%; } 100% { top: 100%; } }
        .radar-animation { animation: radarScanner 6s linear infinite; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-[#020502] text-[#4af626] font-mono min-h-screen p-5 overflow-x-hidden relative selection:bg-green-900">

    <div id="login-overlay" class="fixed inset-0 bg-[#020502] z-50 flex flex-col justify-center items-center">
        <div class="border-2 border-[#4af626] bg-[rgba(4,10,4,0.95)] p-10 text-center shadow-[0_0_30px_rgba(74,246,38,0.35)] max-w-sm w-11/12 backdrop-blur-sm">
            <h2 class="text-xl mb-5 tracking-widest drop-shadow-[0_0_8px_#4af626]">🔒 SECURE TERMINAL GATEWAY</h2>
            <input type="password" id="passkey-input" class="w-full bg-black border border-[#4af626] p-3 text-center text-[#4af626] mb-5 tracking-[0.2em] outline-none focus:shadow-[0_0_15px_rgba(74,246,38,0.7)]" placeholder="••••••••">
            <button onclick="verifyAccess()" class="w-full bg-[#4af626] text-black font-bold py-3 hover:bg-[#39c21e] hover:shadow-[0_0_20px_#4af626] transition-all">AUTHORIZE UPLINK</button>
            <div id="login-error" class="text-red-500 mt-4 font-bold hidden">⚠️ ACCESS DENIED</div>
        </div>
    </div>

    <div id="dashboard-content" class="hidden">
        <header class="text-center border-b border-[#326922] pb-4 mb-5 bg-[rgba(8,14,8,0.85)] backdrop-blur-sm">
            <h1 class="text-2xl font-bold drop-shadow-[0_0_8px_rgba(74,246,38,0.6)]">⚡ BASE COMMAND CONTROL STATION ⚡</h1>
            <p class="text-sm text-gray-500 mt-1">STATION OPERATOR: <strong>COMMANDO</strong></p>
            <div id="live-clock" class="text-yellow-400 font-bold mt-2">TIMESTAMP: LOADING...</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
            <div class="bg-[rgba(6,14,6,0.88)] border-2 border-[#326922] p-4 shadow-[0_0_15px_rgba(50,105,34,0.4)] h-56 overflow-y-auto backdrop-blur-sm">
                <h3 class="text-[#55da35] mb-2 font-bold">🎯 Mission Overview</h3>
                <hr class="border-t border-dashed border-[#326922] my-2">
                <p><strong>CURRENT OBJ:</strong> SECURE THE PERIMETER</p>
                <p><strong>THREAT LEVEL:</strong> <span class="blink text-red-500">CRITICAL</span></p>
            </div>

            <div class="bg-[rgba(6,14,6,0.88)] border-2 border-[#326922] p-4 shadow-[0_0_15px_rgba(50,105,34,0.4)] h-56 overflow-y-auto">
                <h3 class="text-[#55da35] mb-2 font-bold">👥 Comms Node Fleet</h3>
                <hr class="border-t border-dashed border-[#326922] my-2">
                <div id="agent-list-container" class="text-sm"></div>
            </div>
            
            <div class="bg-[rgba(6,14,6,0.88)] border-2 border-[#326922] p-4 shadow-[0_0_15px_rgba(50,105,34,0.4)] h-56 overflow-y-auto">
                <h3 class="text-[#55da35] mb-2 font-bold">🖥️ System Health</h3>
                <hr class="border-t border-dashed border-[#326922] my-2">
                <p>💾 Main Core: 94% Operational</p>
            </div>
        </div>
    </div>

    <script>
        // আপনার আগের ফাংশনগুলো এখানে যথারীতি বসিয়ে দিন...
        function verifyAccess() {
            if (document.getElementById('passkey-input').value === 'Commando71') {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('dashboard-content').classList.remove('hidden');
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
