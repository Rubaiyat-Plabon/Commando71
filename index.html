<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Command Control Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { background-color: #020502; color: #4af626; font-family: 'Courier New', monospace; min-height: 100vh; }
        .radar-scanner { animation: radarScanner 6s linear infinite; }
        @keyframes radarScanner { 0% { top: -100%; } 100% { top: 100%; } }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body class="p-5 overflow-x-hidden">

    <div id="login-overlay" class="fixed inset-0 z-50 bg-[#020502] flex items-center justify-center">
        <div class="border-2 border-[#4af626] bg-[#040a04] p-8 w-80 text-center shadow-[0_0_20px_#4af626]">
            <h2 class="mb-5 tracking-widest">🔒 SECURE TERMINAL</h2>
            <input type="password" id="passkey-input" onkeypress="if(event.key==='Enter') verifyAccess()" class="w-full bg-black border border-[#4af626] p-2 mb-4 text-center outline-none" placeholder="••••••••">
            <button onclick="verifyAccess()" class="w-full bg-[#4af626] text-black font-bold py-2 uppercase hover:bg-green-600 transition">Authorize</button>
            <div id="login-error" class="text-red-500 mt-4 hidden font-bold text-sm">⚠️ ACCESS DENIED</div>
        </div>
    </div>

    <div id="dashboard-content" class="hidden max-w-6xl mx-auto">
        <header class="text-center border-b border-[#326922] pb-4 mb-8">
            <h1 class="text-3xl font-bold text-[#55da35]">⚡ BASE COMMAND CONTROL STATION ⚡</h1>
            <p class="text-sm mt-1">STATION OPERATOR: COMMANDO</p>
            <div id="live-clock" class="text-yellow-400 font-bold mt-2">TIMESTAMP: LOADING...</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
            <div class="bg-[#060e06] border-2 border-[#326922] p-4 h-56 overflow-y-auto">
                <h3 class="font-bold mb-2">🎯 Mission Overview</h3>
                <p><strong>SECTOR:</strong> <span id="current-sector">LOCATING...</span></p>
                <p><strong>THREAT:</strong> <span class="blink text-red-500">CRITICAL</span></p>
            </div>
            <div class="bg-[#060e06] border-2 border-[#326922] p-4 h-56">
                <h3 class="font-bold mb-2">👥 Comms Node Fleet</h3>
                <div id="agent-list" class="text-sm space-y-1">
                    <p>• Commando (Base) <span class="text-green-500">● ONLINE</span></p>
                    <p>• Agent-1 <span class="text-red-500">○ OFFLINE</span></p>
                </div>
            </div>
            <div class="bg-[#060e06] border-2 border-[#326922] p-4 h-56 overflow-y-auto">
                <h3 class="font-bold mb-2">📜 System Audit</h3>
                <div id="audit-logs" class="text-xs"></div>
            </div>
            <div class="md:col-span-3 bg-[#060e06] border-2 border-[#326922] p-4">
                <h3 class="font-bold mb-2">🚨 Incident Reports</h3>
                <div id="incident-feed" class="h-40 overflow-y-auto bg-black p-2 mb-3 border border-[#326922]"></div>
                <div class="flex gap-2">
                    <input type="text" id="base-message" class="flex-grow bg-[#080e08] border border-[#4af626] p-2 text-[#4af626]" placeholder="Transmit Directive...">
                    <button onclick="sendBaseDirective()" class="bg-[#102d10] border border-[#4af626] px-4 font-bold hover:bg-[#4af626] hover:text-black">TRANSMIT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function verifyAccess() {
            if (document.getElementById('passkey-input').value === 'Commando71') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard-content').style.display = 'block';
                startEngine();
            } else { document.getElementById('login-error').style.display = 'block'; }
        }

        function startEngine() {
            setInterval(() => { document.getElementById('live-clock').innerText = `TIMESTAMP: ${new Date().toLocaleString()}`; }, 1000);
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    document.getElementById('current-sector').innerText = `${pos.coords.latitude.toFixed(2)}N, ${pos.coords.longitude.toFixed(2)}E`;
                });
            }
        }

        function sendBaseDirective() {
            const msg = document.getElementById('base-message').value;
            if(msg) {
                const feed = document.getElementById('incident-feed');
                feed.innerHTML += `<div class="text-cyan-400 text-sm">[${new Date().toLocaleTimeString()}] SENT: ${msg}</div>`;
                document.getElementById('base-message').value = '';
            }
        }
    </script>
</body>
</html>
